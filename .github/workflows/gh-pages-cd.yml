name: GitHub Pages Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Update build info
        run: |
          GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          COMMIT_URL="https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA"
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq --arg actor "$GITHUB_ACTOR" \
             --arg sha "$GITHUB_SHA_SHORT" \
             --arg url "$COMMIT_URL" \
             --arg time "$BUILD_TIMESTAMP" \
             '.GITHUB_ACTOR = $actor | .GITHUB_SHA_SHORT = $sha | .COMMIT_URL = $url | .BUILD_TIMESTAMP = $time' \
             src/build-info.json > tmp.json && mv tmp.json src/build-info.json

          # Copy to public directory for direct access
          cp -vf src/build-info.json public/build-info.json

          echo "Updated build-info.json:"
          cat src/build-info.json

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      pages: write
      contents: read
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
